server.port=8080
spring.application.name=movie-booking-platform

# FILE mode: data survives restarts.  Use mem:bookingdb for pure in-memory.
spring.datasource.url=jdbc:h2:file:./data/bookingdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop recreates schema on every start (good for dev).
# Change to "update" or "validate" for persistent data across restarts.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Movie Booking Platform
info.app.version=1.0.0
